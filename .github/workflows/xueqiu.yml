name: Xueqiu Post Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scraper
        run: python xueqiu.py
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          USER_IDS: ${{ secrets.USER_IDS }}
          TEMPLATE_ID_XUEQIU: ${{ secrets.TEMPLATE_ID_XUEQIU }}
          XUEQIU_COOKIE: ${{ secrets.XUEQIU_COOKIE }}

      - name: Commit and Push last ID
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add xueqiu_last_id.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Xueqiu last post ID" && git push)
